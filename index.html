<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Child Developmental Screening Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --ink: #1A1610;
    --ink-soft: #5C5347;
    --ink-faint: #6A6157; 
    --sage: #7A9E8E;
    --sage-light: #D4E8DF;
    --blush: #C9856A;
    --blush-light: #F5DDD5;
    --gold: #C4993A;
    --gold-light: #F5EAD0;
    --slate: #6A7E96;
    --slate-light: #D5E1ED;
    --plum: #8B6A96;
    --plum-light: #E8D9EF;
    --danger: #B84040;
    --danger-light: #F5DCDC;
    --border: rgba(26,22,16,0.1);
    --border-strong: rgba(26,22,16,0.2);
    --radius: 4px;
    --radius-lg: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--ink); color: var(--cream); padding: 0 40px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 17px; letter-spacing: -0.01em; }
  .header-tag { font-size: 11px; color: rgba(250,247,242,0.4); letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── HERO ── */
  .hero { background: var(--ink); color: var(--cream); padding: 64px 40px 72px; position: relative; overflow: hidden; }
  .hero::before, .hero::after { content: ''; position: absolute; border-radius: 50%; pointer-events: none; }
  .hero::before { top: -80px; right: -80px; width: 400px; height: 400px; border: 1px solid rgba(250,247,242,0.05); }
  .hero::after { top: -40px; right: -40px; width: 240px; height: 240px; border: 1px solid rgba(250,247,242,0.08); }
  .hero-inner { max-width: 760px; margin: 0 auto; position: relative; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--sage); margin-bottom: 20px;
  }
  .hero-eyebrow::before { content: ''; display: block; width: 24px; height: 1px; background: var(--sage); }
  .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 4vw, 3rem); line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 16px; }
  .hero h1 em { font-style: italic; color: rgba(250,247,242,0.5); }
  .hero-desc { font-size: 15px; color: rgba(250,247,242,0.55); max-width: 480px; line-height: 1.7; }

  /* ── MAIN LAYOUT & FORM ── */
  .main-wrap { max-width: 800px; margin: 0 auto; padding: 0 24px 80px; }
  .form-panel {
    background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 36px; margin-top: -24px; position: relative; box-shadow: 0 4px 24px rgba(26,22,16,0.07);
  }
  .form-section-label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media(max-width:540px){ .form-row { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 7px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--ink-soft); letter-spacing: 0.01em; }
  .field-hint { font-size: 11px; color: var(--ink-faint); margin-top: -3px; }
  .field input {
    font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px;
    border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--cream);
    color: var(--ink); outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color: var(--sage); box-shadow: 0 0 0 3px rgba(122,158,142,0.15); background: #fff; }

  .error-msg {
    display: none; font-size: 13px; color: var(--danger); background: var(--danger-light);
    border: 1px solid rgba(184,64,64,0.2); border-radius: var(--radius); padding: 12px 16px;
    margin-bottom: 16px; line-height: 1.5;
  }
  .error-msg.show { display: block; }

  .submit-btn {
    width: 100%; padding: 13px 24px; background: var(--ink); color: var(--cream);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.02em;
    border: none; border-radius: var(--radius); cursor: pointer; transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover { background: #2E2A24; }
  .submit-btn:active { transform: scale(0.99); }

  /* ── RESULTS ── */
  #results { display: none; margin-top: 28px; }
  .print-header { display: none; }

  .result-header {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    flex-wrap: wrap; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .result-ages { display: flex; flex-direction: column; gap: 4px; }
  .result-age-row { display: flex; align-items: center; gap: 8px; }
  .age-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); min-width: 110px; }
  .age-val { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--ink); letter-spacing: -0.01em; }
  .corrected-badge {
    font-size: 10px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    background: var(--gold-light); color: var(--gold); border: 1px solid rgba(196,153,58,0.25);
    padding: 3px 8px; border-radius: 20px; margin-left: 8px;
  }
  .corr-note { font-size: 11px; color: var(--ink-faint); margin-top: 4px; }

  /* Milestone Tabs */
  .milestone-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .m-tab {
    padding: 7px 16px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border-strong); border-radius: 20px; cursor: pointer;
    background: transparent; color: var(--ink-soft); transition: all 0.18s; outline: none;
  }
